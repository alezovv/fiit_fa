name: .NET CI

on: [push, pull_request]

jobs:
  test-trees:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build
        run: |
          dotnet restore
          dotnet build TreeDataStructures/TreeDataStructures.csproj -c Release
          dotnet build TreeDataStructures.Tests/TreeDataStructures.Tests.csproj -c Release

      - name: Run AVL tests
        run: |
          dotnet test TreeDataStructures.Tests/TreeDataStructures.Tests.csproj --no-build -c Release --filter "Category=AVL"

      - name: Run BST tests
        run: |
          dotnet test TreeDataStructures.Tests/TreeDataStructures.Tests.csproj --no-build -c Release --filter "Category=BST"

      - name: Run Treap tests
        run: |
          dotnet test TreeDataStructures.Tests/TreeDataStructures.Tests.csproj --no-build -c Release --filter "Category=Treap"

      - name: Run RB tests
        run: |
          dotnet test TreeDataStructures.Tests/TreeDataStructures.Tests.csproj --no-build -c Release --filter "Category=RB"

      - name: Run Splay tests
        run: |
          dotnet test TreeDataStructures.Tests/TreeDataStructures.Tests.csproj --no-build -c Release --filter "Category=Splay"